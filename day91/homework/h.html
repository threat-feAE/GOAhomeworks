<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .container {
            display: flex;
            }

            .box {
            width: 100px;
            height: 100px;
            }

            .red {
            background: red;
            }

            .green {
            background: green;
            position: relative;
            left: 30px;
            top: 20px;
            }

            .blue {
            background: blue;
            }

            .box {
            width: 100px;
            height: 100px;
            margin: 10px;
            }

            .static-box {
            background: gray;
            }

            .relative-box {
            background: orange;
            position: relative;
            left: -40px;
            }


            .parent {
            width: 300px;
            height: 300px;
            background: rgb(212, 212, 212);
            position: relative;
            }

            .child {
            width: 100px;
            height: 100px;
            background: blue;
            position: absolute;
            bottom: 0;
            left: 0;
            }



            
            .kopa {
            width: 300px;
            height: 300px;
            background: rgb(185, 185, 185);
            position: relative;
            }

            .lopa {
            width: 100px;
            height: 100px;
            background: blue;
            position: absolute;
            left: 40%;
            top: 40%;
            }


            .brao {
            width: 300px;
            height: 300px;
            background: rgb(196, 196, 196);
            position: relative;
            }

            .bravo {
            width: 100px;
            height: 100px;
            background: rgb(216, 23, 62);
            position: absolute;
            top: 50%;
            left: 50%;
            margin-left: 40px;
            margin-top: -20px;
            }
        </style>
    </head>
    <body>
            <!-- 2 -->
        <div class="container">
            <div class="box red"></div>
            <div class="box green"></div>
            <div class="box blue"></div>
        </div>

            <!-- 3 -->
            <div class="box static-box"></div>
            <div class="box relative-box"></div>



            <div class="parent">
            <div class="child"></div>
            </div>

            <!-- 4 -->
            <div class="kopa">
            <div class="lopa"></div>
            </div>


            <!-- 5 -->
            <div class="brao">
            <div class="bravo"></div>
            </div>

            

    </body>
</html>
