<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .container {
                width: 260px;
                height: 250px;
                background: #e0d5d5;
                border: 6px solid #222;
                position: relative;
            }

            .purple {
                width: 125px;
                height: 125px;
                background: rgb(137, 41, 227);
                position: absolute;
                top: 25px;
                left: 30px;
                z-index: 2;
            }

            .red {
                width: 125px;
                height: 125px;
                background: red;
                position: absolute;
                top: 55px;
                left: 65px;
                z-index: 1;
            }

            .green {
                width: 125px;
                height: 125px;
                background: green;
                position: absolute;
                top: 85px;
                left: 95px;
                z-index: 3;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="purple"></div>
            <div class="red"></div>
            <div class="green"></div>
        </div>

    </body>
</html>
