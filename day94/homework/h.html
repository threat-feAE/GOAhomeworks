<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
        .container{
            width:400px;
            height:400px;
            background:red;
            position:relative;
        }

        .box{
            width:50px;
            height:50px;
            background:blue;
            position:absolute;
            top:0;
            right:0;
        }
        

        .card{
            width:300px;
            position:relative;
        }

        .card img{
            width:100%;
        }

        .sale{
            position:absolute;
            top:10px;
            right:10px;
            background:red;
            color:white;
            padding:5px 10px;
        }



        .nav23{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            background:black;
            color:white;
            padding:20px;
        }


        .chat{
            position:fixed;
            bottom:20px;
            right:20px;
            width:60px;
            height:60px;
            background:green;
            color:white;
            border-radius:50%;
            text-align:center;
            line-height:60px;
        }


    </style>
    </head>
    <body>
        
        <div class="container">
            <div class="box"></div>
        </div>


        <div class="card">
            <img src="download.jpg">
            <div class="sale">SALE</div>
        </div>


                           
        <nav class="nav23">Navigation Menu</nav>
    </body>
       


    <div class="chat">💬</div>


</html>
