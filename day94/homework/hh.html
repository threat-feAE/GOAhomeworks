<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

            <style>
            .container{
                width:500px;
                height:500px;
                background:lightgray;
                position:relative;
            }

            .box{
                width:60px;
                height:60px;
                background:blue;
                position:absolute;
            }

            .tl{top:0; left:0;}
            .tr{top:0; right:0;}
            .bl{bottom:0; left:0;}
            .br{bottom:0; right:0;}
            </style>
    </head>
    <body>

        <div class="container">
            <div class="box tl">ko</div>
            <div class="box tr">pa</div>
            <div class="box bl">lo</div>
            <div class="box br">pa</div>
        </div>

    </body>
</html>
