<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {
        border: 2px solid black;
        font-family: Arial;
        padding: 10px;
        }

        li {
        border: 1px solid gray;
        background-color: #f2f2f2;
        margin: 5px;
        padding: 10px;
        transition: 0.3s;
        }

        li:hover {
        background-color: black;
        color: white;
        }


        ol {
        font-family: Georgia;
        font-size: 18px;
        color: white;
        background-color: #1abc9c;
        border: 2px solid black;
        text-align: left;
        }

        li {
        margin: 5px;
        }
    </style>
</head>
<body>
    <ul>
  <li>HTML</li>
  <li>CSS</li>
  <li>JavaScript</li>
</ul>



<ol>
  <li>ქრისტიანობის გავრცელება</li>
  <li>რომის იმპერიის დაცემა</li>
  <li>მეორე მსოფლიო ომი</li>
</ol>

</body>
</html>
