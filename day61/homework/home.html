<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>homework</title>
        <style>
            #myDiv {
                background-color: lightblue; 
                color: darkblue;             
                width: 300px;                 
                height: 150px;                
                border: 3px solid black;       
                text-align: center;           
            }



            #container {
                color: green;  
            }

            #container h1 {
                color: red;  
            }



            #mainTitle {
                color: purple;
                font-size: 40px;
            }



            #div1 {
                background-color: yellow;
            }

            #div2 {
                background-color: lightgreen;
            }


            #car1 { color: red; }
            #car2 { color: blue; }
            #car3 { color: green; }
            #car4 { color: orange; }
            #car5 { color: purple; }



            #country1 { color: red; }
            #country2 { color: blue; }
            #country3 { color: green; }
            #country4 { color: orange; }
            #country5 { color: purple; }



            #box1 {
                width: 200px;
                height: 100px;
                background-color: lightblue;
            }

            #box2 {
                width: 250px;
                height: 120px;
                background-color: lightgreen;
            }

            #box3 {
                width: 300px;
                height: 140px;
                background-color: lightcoral;
            }


            #box1 button {
                background-color: blue;
                color: white;
            }

            #box2 button {
                background-color: green;
                color: white;
            }

            #box3 button {
                background-color: red;
                color: white;
            }



        </style>
    </head>
    <body>
            <!-- 
            id არის უნიკალური ატრიბუტი, რომელიც ენიჭება ერთ კონკრეტულ ელემენტს.
            იგი გამოიყენება იმისთვის, რომ CSS-ში ან JavaScript-ში ზუსტად ამ ელემენტს მივწვდეთ.

            id უნდა იყოს უნიკალური — ერთ გვერდზე ერთი და იგივე id არ შეიძლება ორჯერ გამოყენება.

            CSS-ში id-ს მივწვდებით # სიმბოლოთი.
            მაგალითად თუ HTML-ში გვაქვს id="box"
            CSS-ში მას მივწვდებით ასე:  #box { }
            -->

        <div id="myDiv">
            ეს არის ჩემი დივი
        </div>


        <div id="container">
            <h1>სათაური</h1>
            <p>ეს არის პარაგრაფი</p>
        </div>



        <h1 id="mainTitle">მთავარი სათაური</h1>
        <h2>მეორე სათაური</h2>



        <div id="div1">
            პირველი დივი
        </div>

        <div id="div2">
            მეორე დივი
        </div>


        <ol>
            <li id="car1">BMW</li>
            <li id="car2">Mercedes</li>
            <li id="car3">Audi</li>
            <li id="car4">Toyota</li>
            <li id="car5">Honda</li>
        </ol>



    <select>
        <option id="country1">Georgia</option>
        <option id="country2">Germany</option>
        <option id="country3">France</option>
        <option id="country4">Italy</option>
        <option id="country5">Spain</option>
    </select>



    <div id="box1">
        <button>Button 1</button>
    </div>

    <div id="box2">
        <button>Button 2</button>
    </div>

    <div id="box3">
        <button>Button 3</button>
    </div>


    </body>
</html>
