<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="box-style" id="unique-box">
        <h2>სათაური</h2>
        <p>ეს არის პარაგრაფი დივის შიგნით</p>
    </div>



        <p class="paragraph-class" id="paragraph-id">
            ეს არის პარაგრაფი რომელსაც აქვს class და id
        </p>



    <div class="div-style">
        <p class="p-style">
            დააკვირდი — დივს თავისი ფონი აქვს, პარაგრაფს თავისი.
        </p>
    </div>


     <section id="main-section" class="section-class">
        <h1 style="color: #ff0000;background-color: #000000;font-size: 50px;border: 6px solid #00ffff;text-align: center;padding: 20px;">მთავარი სათაური
        </h1>
    </section>


    <div class="parent-div">
        <button id="btn-id" class="btn-class"
        style="color: #ffffff;background-color: #ff0000;font-size: 22px;border: 4px solid #000000;">დააჭირე
        </button>
    </div>




    <div id="container" class="container-class">

        <h1 id="h1-id" class="h-class"
        style="color:#ffffff; background-color:#000000; font-size:40px;">
            სათაური 1
        </h1>

        <h2 class="h-class">
            სათაური 2
        </h2>

        <p id="p1-id" class="p-class"
        style="border:5px solid #ff0000;">
            პარაგრაფი 1
        </p>

        <p class="p-class">
            პარაგრაფი 2
        </p>

    </div>

</body>
