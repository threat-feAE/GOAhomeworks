<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

.link1:link {
  color: blue;
  font-size: 18px;
  text-decoration: none;
}


.link2:hover {
  font-weight: bold;
  color: red;
}


.link3:visited {
  color: violet;
  font-family: Arial;
}


.link4:active {
  background-color: yellow;
  border: 2px solid black;
}


.link5:hover {
  text-decoration: underline;
  color: green;
  font-size: 20px;
}


.link6:visited {
  background-color: lightgray;
  color: darkblue;
  text-align: center;
}


.link7:link {
  color: yellow;
  font-family: Verdana;
}

.link7:active {
  border: 3px solid red;
  background-color: pink;
}
</style>
</head>


<body>
<a href="" class="link1">Link 1</a><br>
<a href="" class="link2">Link 2</a><br>
<a href="" class="link3">Link 3</a><br>
<a href="" class="link4">Link 4</a><br>
<a href="" class="link5">Link 5</a><br>
<a href="" class="link6">Link 6</a><br>
<a href="" class="link7">Link 7</a><br>
</body>
</html>
