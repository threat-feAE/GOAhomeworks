<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
     body{
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3ebe4;
      font-family:'Montserrat', sans-serif;
      padding:20px;
    }
 

    .card{
      display:flex;
      max-width:700px;
      background:#ffffff;
      border-radius:16px;
    }

    
    .card-image img{
      width:350px;
      height:565px;
      object-fit:cover;
      display:block;
      border-radius: 10px;
    }
    


       .card-content{
      flex:1;
      padding:34px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .category{
      letter-spacing:5px;
      font-size:12px;
      color:#777;
      margin-bottom:20px;
    }

    h1{
      font-family:'Fraunces', serif;
      font-size:40px;
      line-height:1;
      color:#1c232b;
      margin-bottom:24px;
    }

    .description{
      color:#6c7289;
      font-size:15px;
      line-height:1.8;
      margin-bottom:28px;
    }

    .price{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:30px;
    }

    .new-price{
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      font-size:38px;
      color:#3d8168;
      font-weight:700;
    }

    .old-price{
      color:#6c7289;
      text-decoration:line-through;
      font-size:14px;
    }

    .btn{
      border:none;
      background:#1b4134;
      color:#fff;
      padding:16px;
      border-radius:12px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .btn:hover{
      background:#143126;
    }

  


  </style>
</head>
<body>
 <div class="card">

    <div class="card-image">
      <img src="image-product-desktop.jpg" alt="Perfume">
    </div>

    <div class="card-content">

      <p class="category">PERFUME</p>

      <h1>
        Gabrielle<br>
        Essence Eau<br>
        De Parfum
      </h1>

      <p class="description">
        A floral, solar and voluptuous interpretation composed by
        Olivier Polge, Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price">
        <span class="new-price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>

      <button class="btn">
       Add to Cart
      </button>

    </div>

  </div>

</body>
</html>
