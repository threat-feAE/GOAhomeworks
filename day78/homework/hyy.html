<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
            <style>
            body {
            background: lightgray;
            text-align: center;
            margin-top: 100px;
            font-family: sans-serif;
            }

            .box {
            width: 300px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            }

            
            input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid gray;
            outline: none;
            }

            
            button {
            width: 95%;
            padding: 10px;
            background: skyblue;
            color: white;
            border: none;
            border-radius: 5px;
            }


            button:hover{
            background: rgb(4, 38, 51);    
            }
        </style>
    </head>

    <body>

        <div class="box">
        <h3>Login</h3>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
        </div>

    </body>
</html>
