<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                font-family: sans-serif;
                background-color: #f2f2f2;
                text-align: center;
            }

            form {
                background: white;
                padding: 20px;
                display: inline-block;
                border-radius: 10px;
            }

            input {
                display: block;
                width: 250px;

                outline: none;
                background-color: rgb(241, 241, 241);
                border: 2px solid red;
                color: blue;
                border-radius: 10px;
                font-family: cursive;
                padding: 5px;
            }

            input:focus {
                background-color: black;
                color: rgb(0, 0, 0);
                padding:3px;
            }

        </style>

    </head>
    <body>
        <main>
            <form>
                <input type="text" placeholder="შეიყვანე სახელი">
                <input type="email" placeholder="შეიყვანე ემაილი">
                <input type="password" placeholder="შეიყვანე პაროლი">
            </form>
        </main>
    </body>
</html>
