<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>


        table {
        width: 100%;
        border-collapse: collapse;
        }


        table, th, td {
        border: 2px solid black;
        text-align: center;
        }


        tr:nth-child(odd) {
        color: green;
        background-color: red;
        font-family: cursive;
        }


        tr:nth-child(even) {
        color: yellow;
        background-color: blue;
        font-family: sans-serif;
        font-size: 35px;
        }
        </style>
    </head>
    <body>

        <table>
        <tr>
            <th>მარკა</th>
            <th>მოდელი</th>
            <th>წელი</th>
        </tr>
        <tr>
            <td>BMW</td>
            <td>X5</td>
            <td>2020</td>
        </tr>
        <tr>
            <td>Mercedes</td>
            <td>C-Class</td>
            <td>2019</td>
        </tr>
        <tr>
            <td>Audi</td>
            <td>A6</td>
            <td>2021</td>
        </tr>
        <tr>
            <td>Toyota</td>
            <td>Camry</td>
            <td>2018</td>
        </tr>
        <tr>
            <td>Honda</td>
            <td>Civic</td>
            <td>2022</td>
        </tr>
        </table>


    </body>
</html>
